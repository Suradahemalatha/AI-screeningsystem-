<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recruiter - Intelligent Candidate Ranking</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🤖 AI Recruiter</h1>

        <p class="subtitle">
            Intelligent Candidate Ranking System
        </p>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <div class="form-group">

                <label>📄 Upload Job Description</label>

                <input
                    type="file"
                    name="job_description"
                    accept=".txt,.pdf,.doc,.docx"
                    required>

            </div>

            <div class="form-group">

                <label>📑 Upload Candidate Resume</label>

                <input
                    type="file"
                    name="resume"
                    accept=".pdf,.doc,.docx,.txt"
                    required>

            </div>

            <button type="submit">
                Rank Candidate
            </button>

        </form>

        <hr>

        <h3>Project Features</h3>

        <ul>
            <li>✔ Upload Job Description</li>
            <li>✔ Upload Resume</li>
            <li>✔ Extract Skills using AI</li>
            <li>✔ Semantic Matching</li>
            <li>✔ Candidate Ranking</li>
            <li>✔ Match Percentage</li>
            <li>✔ Missing Skills Detection</li>
            <li>✔ AI Recommendation</li>
        </ul>

    </div>

</body>

</html>
